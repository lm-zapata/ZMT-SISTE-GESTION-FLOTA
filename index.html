<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ZM Transportes — Sistema de Gestión de Flota</title>
<style>
:root{--rojo:#a32d2d;--rojo-oscuro:#7a1f1f;--rojo-claro:#fde8e8;--negro:#1a1a1a;--negro-suave:#2b2b2b;--gris-texto:#5b5b5f;--gris-claro:#f4f4f5;--gris-borde:#e2e2e4;--verde:#2f7d4f;--verde-claro:#e7f5ec;--naranja:#c98a2c;--blanco:#ffffff;--sombra:0 2px 10px rgba(0,0,0,.06);--sombra-fuerte:0 8px 28px rgba(0,0,0,.16);--radio:14px;--radio-chico:10px}
*{box-sizing:border-box}html,body{margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--gris-claro);color:var(--negro);-webkit-font-smoothing:antialiased}
#root{min-height:100vh}button{font-family:inherit;cursor:pointer}input,select,textarea{font-family:inherit}
.app-shell{min-height:100vh;display:flex;flex-direction:column;background:var(--gris-claro)}
.login-bg{min-height:100vh;background:radial-gradient(circle at 80% 8%,rgba(163,45,45,.35),transparent 45%),linear-gradient(135deg,#0d0d0d 0,#1a1a1a 45%,#2a1414 100%);display:flex;align-items:center;justify-content:center;padding:32px 18px;position:relative;overflow:hidden}
.login-card-wrap{width:100%;max-width:460px;position:relative;z-index:1}
.login-logo-box{width:170px;height:170px;background:var(--blanco);border-radius:24px;margin:0 auto 18px;display:flex;align-items:center;justify-content:center;box-shadow:var(--sombra-fuerte);padding:18px}
.login-logo-box img{width:100%;height:100%;object-fit:contain}
.login-subtitle{text-align:center;color:#b9b9bd;letter-spacing:3px;font-size:13px;font-weight:700;margin-bottom:28px;text-transform:uppercase}
.login-card{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:22px;padding:26px 22px 22px;backdrop-filter:blur(6px)}
.login-error{background:rgba(220,60,60,.15);border:1px solid rgba(220,60,60,.5);color:#ff9d9d;border-radius:var(--radio-chico);padding:12px 14px;font-size:14px;font-weight:600;margin-bottom:16px;text-align:center}
.login-field-label{color:#a3a3a8;font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;text-align:center;display:block;margin-bottom:10px}
.login-input{width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);color:#fff;border-radius:var(--radio-chico);padding:16px;font-size:17px;margin-bottom:20px;outline:none;transition:border-color .15s}
.login-input::placeholder{color:#6b6b70}.login-input:focus{border-color:var(--rojo)}
.login-remember{display:flex;align-items:center;gap:10px;margin-bottom:20px;color:#c7c7cb;font-size:14px;font-weight:600;user-select:none;cursor:pointer}
.login-checkbox{width:22px;height:22px;border-radius:6px;border:2px solid #6b6b70;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.login-checkbox.checked{background:var(--rojo);border-color:var(--rojo)}
.btn-primary{width:100%;background:linear-gradient(180deg,#c23b3b,var(--rojo-oscuro));color:#fff;border:none;border-radius:var(--radio-chico);padding:17px;font-size:17px;font-weight:700;box-shadow:0 6px 18px rgba(163,45,45,.45);transition:transform .1s,box-shadow .15s}
.btn-primary:active{transform:scale(.98)}.btn-primary:disabled{opacity:.55;box-shadow:none}
.login-footer{text-align:center;color:#7a7a7e;font-size:11px;letter-spacing:1.5px;margin-top:22px;text-transform:uppercase}
.app-header{background:var(--negro);display:flex;align-items:center;justify-content:space-between;padding:12px 18px;flex-wrap:wrap;gap:10px;border-bottom:1px solid #000}
.app-header-left{display:flex;align-items:center;gap:14px;min-width:0}
.app-header-logo{width:48px;height:48px;background:#fff;border-radius:10px;display:flex;align-items:center;justify-content:center;padding:5px;flex-shrink:0}
.app-header-logo img{width:100%;height:100%;object-fit:contain}
.app-header-divider{width:1px;height:30px;background:#444;flex-shrink:0}
.app-header-user{color:#cfcfd2;font-size:15px;font-weight:600;white-space:nowrap}
.app-header-right{display:flex;align-items:center;gap:10px}
.icon-btn{background:transparent;border:1px solid #444;color:#cfcfd2;border-radius:10px;width:42px;height:42px;display:flex;align-items:center;justify-content:center;position:relative;flex-shrink:0}
.icon-btn:hover{border-color:var(--rojo)}
.notif-dot{position:absolute;top:-4px;right:-4px;background:var(--rojo);color:#fff;font-size:10px;font-weight:800;border-radius:20px;min-width:18px;height:18px;display:flex;align-items:center;justify-content:center;padding:0 4px;border:2px solid var(--negro)}
.btn-logout{background:transparent;border:1px solid #555;color:#e2e2e5;border-radius:10px;padding:10px 18px;font-size:14px;font-weight:700;white-space:nowrap}
.btn-logout:hover{background:var(--rojo);border-color:var(--rojo)}
.app-nav{background:#161616;display:flex;gap:6px;padding:0 14px;overflow-x:auto;border-bottom:1px solid #000}
.app-nav-item{background:transparent;border:none;color:#8d8d92;font-size:15px;font-weight:700;padding:16px 16px 13px;border-bottom:3px solid transparent;white-space:nowrap}
.app-nav-item.active{color:#fff;border-bottom-color:var(--rojo)}
.notif-panel-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:90;display:flex;justify-content:flex-end}
.notif-panel{width:100%;max-width:400px;background:var(--blanco);height:100%;box-shadow:-8px 0 30px rgba(0,0,0,.25);display:flex;flex-direction:column;animation:slideIn .18s ease-out}
@keyframes slideIn{from{transform:translateX(40px);opacity:0}to{transform:translateX(0);opacity:1}}
.notif-panel-header{padding:18px 20px;border-bottom:1px solid var(--gris-borde);display:flex;align-items:center;justify-content:space-between}
.notif-panel-header h3{margin:0;font-size:18px}.notif-panel-body{flex:1;overflow-y:auto}
.notif-item-wrap{position:relative;overflow:hidden;border-bottom:1px solid var(--gris-borde)}
.notif-item-delete-bg{position:absolute;inset:0;background:var(--rojo);display:flex;align-items:center;justify-content:flex-end;padding-right:22px;color:#fff;font-weight:700;font-size:13px}
.notif-item{background:var(--blanco);padding:14px 20px;position:relative;transition:transform .15s;touch-action:pan-y}
.notif-item-text{font-size:14px;color:var(--negro);font-weight:600;margin-bottom:4px}
.notif-item-time{font-size:12px;color:var(--gris-texto)}.notif-empty{padding:40px 20px;text-align:center;color:var(--gris-texto);font-size:14px}
.page-wrap{flex:1;padding:22px 18px 90px;max-width:1000px;width:100%;margin:0 auto;position:relative}
.page-header-row{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:18px;gap:12px;flex-wrap:wrap}
.page-title{font-size:26px;font-weight:800;margin:0 0 4px}.page-subtitle{color:var(--gris-texto);font-size:14px;margin:0}
.btn-new{background:linear-gradient(180deg,#c23b3b,var(--rojo-oscuro));color:#fff;border:none;border-radius:12px;padding:13px 22px;font-size:15px;font-weight:700;box-shadow:0 4px 14px rgba(163,45,45,.35);white-space:nowrap}
.filter-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px}
.filter-pill{background:var(--blanco);border:1.5px solid var(--gris-borde);color:var(--negro);border-radius:24px;padding:11px 20px;font-size:14px;font-weight:700}
.filter-pill.active{background:var(--rojo);border-color:var(--rojo);color:#fff}
.empty-card{background:var(--blanco);border-radius:var(--radio);padding:50px 20px;text-align:center;color:var(--gris-texto);font-size:15px;box-shadow:var(--sombra)}
.record-list{display:flex;flex-direction:column;gap:10px}
.record-card{background:var(--blanco);border-radius:var(--radio);box-shadow:var(--sombra);padding:16px 18px;display:grid;grid-template-columns:auto 1fr 1fr 1fr auto;gap:14px;align-items:center;cursor:pointer;transition:box-shadow .15s}
.record-card:hover{box-shadow:var(--sombra-fuerte)}
.record-col-label{font-size:10px;font-weight:700;color:#9a9a9e;letter-spacing:1px;text-transform:uppercase;margin-bottom:3px}
.record-col-value{font-size:14.5px;font-weight:700;color:var(--negro)}
.status-badge{display:inline-flex;align-items:center;justify-content:center;padding:7px 13px;border-radius:20px;font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;white-space:nowrap}
.status-badge.rojo{background:#fde8e8;color:#a32d2d}.status-badge.verde{background:var(--verde-claro);color:var(--verde)}
.form-back-row{display:flex;align-items:center;gap:16px;margin-bottom:20px;flex-wrap:wrap}
.btn-back{background:transparent;border:1.5px solid var(--rojo);color:var(--rojo);border-radius:10px;padding:9px 18px;font-size:14px;font-weight:700;display:flex;align-items:center;gap:6px}
.form-page-title{font-size:23px;font-weight:800;margin:0}
.form-card{background:var(--blanco);border-radius:var(--radio);box-shadow:var(--sombra);padding:22px 20px;margin-bottom:16px}
.form-card-title{display:flex;align-items:center;gap:10px;font-size:17px;font-weight:800;margin:0 0 16px}
.form-card-bar{width:4px;height:20px;background:var(--rojo);border-radius:3px;display:inline-block}
.form-divider{border:none;border-top:1px solid var(--gris-borde);margin:0 0 18px}
.form-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:18px}
@media (max-width:640px){.form-grid-2{grid-template-columns:1fr}}
.form-field{margin-bottom:18px}
.form-label{display:block;font-size:12.5px;font-weight:700;color:#5b5b5f;letter-spacing:1px;text-transform:uppercase;margin-bottom:9px;text-align:left}
.form-label .req{color:var(--rojo);margin-left:3px}
.form-input{width:100%;background:var(--gris-claro);border:1.5px solid var(--gris-borde);border-radius:var(--radio-chico);padding:14px 15px;font-size:15.5px;color:var(--negro);outline:none;transition:border-color .15s,background .15s}
.form-input:focus{border-color:var(--rojo);background:#fff}.form-input.error{border-color:var(--rojo);background:var(--rojo-claro)}
.form-input::placeholder{color:#a8a8ac}textarea.form-input{resize:vertical;min-height:90px;font-family:inherit}
.form-error-text{color:var(--rojo);font-size:12.5px;font-weight:600;margin-top:6px}
.form-select-wrap{position:relative}.form-select-wrap::after{content:"▾";position:absolute;right:16px;top:50%;transform:translateY(-50%);color:#8a8a8e;pointer-events:none;font-size:14px}
select.form-input{appearance:none;-webkit-appearance:none;background:var(--gris-claro)}
.toggle-row{display:flex;gap:10px}
.toggle-btn{flex:1;background:var(--gris-claro);border:1.5px solid var(--gris-borde);color:var(--negro);border-radius:var(--radio-chico);padding:15px;font-size:15px;font-weight:700}
.toggle-btn.active{background:var(--rojo-claro);border-color:var(--rojo);color:var(--rojo)}.toggle-btn.error{border-color:var(--rojo)}
.fuel-row{display:flex;flex-direction:column;align-items:center;gap:14px;margin-bottom:8px}
.fuel-tank{width:88px;height:128px;border:3px solid var(--negro);border-radius:10px;position:relative;overflow:hidden;background:#fff;display:flex;align-items:flex-end}
.fuel-tank-fill{width:100%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:14px;transition:height .2s}
.fuel-tank-lines{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:space-evenly;pointer-events:none}
.fuel-tank-lines div{border-top:1.5px dashed rgba(0,0,0,.25);width:100%}
.fuel-levels-row{display:flex;gap:6px;flex-wrap:wrap;justify-content:center}
.fuel-level-btn{background:var(--blanco);border:1.5px solid var(--gris-borde);color:var(--negro);border-radius:8px;padding:9px 13px;font-size:13.5px;font-weight:700;min-width:44px}
.fuel-level-btn.active{background:var(--rojo);border-color:var(--rojo);color:#fff}
.fuel-section-label{font-size:13px;font-weight:700;color:#8a8a8e;letter-spacing:1px;text-transform:uppercase;margin-bottom:12px;text-align:center}
.dyn-row{display:grid;grid-template-columns:1fr 1fr auto;gap:10px;margin-bottom:10px;align-items:start}
@media (max-width:560px){.dyn-row{grid-template-columns:1fr}}
.btn-add-row{background:var(--rojo);color:#fff;border:none;border-radius:var(--radio-chico);padding:14px 20px;font-size:14px;font-weight:700;white-space:nowrap;height:48px}
.btn-add-row.secondary{background:var(--negro)}
.added-item-row{display:flex;justify-content:space-between;align-items:center;background:var(--gris-claro);border-radius:10px;padding:11px 14px;margin-bottom:8px;font-size:14px}
.added-item-row .desc{color:var(--gris-texto);font-size:12.5px;display:block;margin-top:2px}
.btn-remove-x{background:transparent;border:none;color:var(--rojo);font-weight:800;font-size:16px;padding:4px 8px}
.note-box{background:#fff8e8;border:1px solid #f0d99a;border-radius:var(--radio-chico);padding:14px 16px;font-size:13.5px;color:#7a5c14;margin-bottom:16px;line-height:1.5}
.form-actions{display:flex;gap:12px;margin-top:4px;flex-wrap:wrap}
.btn-cancel{flex:1;background:var(--blanco);border:1.5px solid var(--gris-borde);color:var(--negro);border-radius:var(--radio-chico);padding:16px;font-size:15.5px;font-weight:700;min-width:140px}
.btn-save{flex:2;background:linear-gradient(180deg,#c23b3b,var(--rojo-oscuro));color:#fff;border:none;border-radius:var(--radio-chico);padding:16px;font-size:15.5px;font-weight:700;min-width:160px;box-shadow:0 4px 14px rgba(163,45,45,.3)}
.btn-save:disabled{opacity:.6}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px}
.modal-box{background:#fff;border-radius:18px;max-width:420px;width:100%;padding:26px 24px;box-shadow:0 20px 60px rgba(0,0,0,.3);animation:popIn .15s ease-out}
@keyframes popIn{from{transform:scale(.94);opacity:0}to{transform:scale(1);opacity:1}}
.modal-icon{width:54px;height:54px;border-radius:50%;background:var(--rojo-claro);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:26px;color:var(--rojo);font-weight:800}
.modal-title{font-size:18px;font-weight:800;text-align:center;margin:0 0 8px}
.modal-text{font-size:14.5px;color:var(--gris-texto);text-align:center;margin:0 0 22px;line-height:1.5}
.modal-actions{display:flex;gap:10px}.modal-btn{flex:1;border-radius:var(--radio-chico);padding:14px;font-size:15px;font-weight:700;border:none}
.modal-btn-cancel{background:var(--gris-claro);color:var(--negro)}.modal-btn-confirm{background:var(--rojo);color:#fff}
.modal-input-group{margin-bottom:14px}
.analysis-modal{max-width:560px;max-height:88vh;overflow-y:auto;text-align:left}
.analysis-score-wrap{text-align:center;margin-bottom:20px}
.analysis-score-circle{width:120px;height:120px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto 10px;border:6px solid var(--gris-borde)}
.analysis-score-num{font-size:32px;font-weight:800}
.analysis-tag{display:inline-block;padding:6px 16px;border-radius:20px;font-size:13px;font-weight:800;text-transform:uppercase;letter-spacing:.5px}
.analysis-section{margin-bottom:16px}
.analysis-section-title{font-size:13px;font-weight:800;color:#8a8a8e;letter-spacing:1px;text-transform:uppercase;margin-bottom:10px}
.analysis-row{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--gris-borde);font-size:14.5px}
.analysis-row:last-child{border-bottom:none}.analysis-row .label{color:var(--gris-texto)}.analysis-row .value{font-weight:700}
.analysis-row.total .value{color:var(--rojo);font-size:16px}
.analysis-comment-box{background:var(--gris-claro);border-radius:10px;padding:14px;font-size:14px;line-height:1.55;color:#3a3a3d}
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.kpi-card{background:var(--blanco);border-radius:var(--radio);padding:20px 16px;text-align:center;box-shadow:var(--sombra)}
.kpi-card.full{grid-column:1/-1}.kpi-card.highlight{background:var(--verde-claro)}
.kpi-label{font-size:12px;font-weight:700;color:#8a8a8e;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px}
.kpi-value{font-size:24px;font-weight:800}.kpi-value.green{color:var(--verde)}.kpi-value.neg{color:var(--rojo)}
.dist-card{background:var(--blanco);border-radius:var(--radio);padding:24px 20px;box-shadow:var(--sombra)}
.dist-title{font-size:16px;font-weight:800;text-align:center;letter-spacing:1px;margin-bottom:20px;text-transform:uppercase}
.dist-chart-wrap{display:flex;justify-content:center;margin-bottom:20px}
.dist-legend-row{display:flex;align-items:center;justify-content:space-between;padding:11px 4px;border-bottom:1px solid var(--gris-borde)}
.dist-legend-row:last-child{border-bottom:none}.dist-legend-left{display:flex;align-items:center;gap:12px}
.dist-swatch{width:14px;height:14px;border-radius:4px;flex-shrink:0}.dist-legend-name{font-size:14.5px;font-weight:600}
.dist-legend-pct{font-size:14.5px;font-weight:800;width:48px;text-align:right}.dist-legend-amt{font-size:14px;color:var(--gris-texto);width:90px;text-align:right}
.btn-analyze{width:100%;background:var(--negro);color:#fff;border:none;border-radius:var(--radio);padding:18px;font-size:16px;font-weight:800;margin-top:18px;letter-spacing:.5px}
.help-section{background:var(--blanco);border-radius:var(--radio);box-shadow:var(--sombra);padding:22px 20px;margin-bottom:14px}
.help-section h3{font-size:17px;font-weight:800;margin:0 0 12px;display:flex;align-items:center;gap:10px}
.help-section p{font-size:14.5px;line-height:1.65;color:#3a3a3d}
.help-step{display:flex;gap:12px;margin-bottom:14px}
.help-step-num{width:26px;height:26px;border-radius:50%;background:var(--rojo);color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;flex-shrink:0}
.help-step-text{font-size:14.5px;line-height:1.6;color:#3a3a3d}.help-step-text b{color:var(--negro)}
.ai-fab{position:fixed;bottom:24px;right:24px;width:58px;height:58px;border-radius:50%;background:var(--rojo);color:#fff;border:none;font-size:26px;font-weight:800;box-shadow:0 6px 22px rgba(163,45,45,.55);z-index:80;display:flex;align-items:center;justify-content:center}
.ai-chat-panel{position:fixed;bottom:24px;right:24px;width:360px;max-width:92vw;height:520px;max-height:78vh;background:#fff;border-radius:18px;box-shadow:0 16px 50px rgba(0,0,0,.3);z-index:95;display:flex;flex-direction:column;overflow:hidden;animation:popIn .15s ease-out}
.ai-chat-header{background:var(--negro);color:#fff;padding:16px 18px;display:flex;justify-content:space-between;align-items:center}
.ai-chat-header span{font-weight:700;font-size:15px}.ai-chat-close{background:transparent;border:none;color:#cfcfd2;font-size:20px}
.ai-chat-body{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px;background:var(--gris-claro)}
.ai-msg{max-width:84%;padding:11px 14px;border-radius:14px;font-size:14px;line-height:1.5}
.ai-msg.bot{background:#fff;align-self:flex-start;box-shadow:var(--sombra)}.ai-msg.user{background:var(--rojo);color:#fff;align-self:flex-end}
.ai-chat-suggestions{display:flex;flex-wrap:wrap;gap:6px;padding:0 16px 12px}
.ai-suggestion-chip{background:#fff;border:1.5px solid var(--gris-borde);border-radius:16px;padding:8px 13px;font-size:12.5px;font-weight:600;color:var(--negro)}
.ai-chat-input-row{display:flex;gap:8px;padding:12px;border-top:1px solid var(--gris-borde);background:#fff}
.ai-chat-input{flex:1;border:1.5px solid var(--gris-borde);border-radius:20px;padding:11px 16px;font-size:14px;outline:none}.ai-chat-input:focus{border-color:var(--rojo)}
.ai-chat-send{background:var(--rojo);color:#fff;border:none;border-radius:50%;width:40px;height:40px;font-size:16px;flex-shrink:0}
.wheel-trigger{width:100%;background:var(--gris-claro);border:1.5px solid var(--gris-borde);border-radius:var(--radio-chico);padding:14px 15px;font-size:15.5px;color:var(--negro);text-align:left;font-weight:600}
.wheel-trigger.placeholder{color:#a8a8ac;font-weight:400}.wheel-trigger.error{border-color:var(--rojo);background:var(--rojo-claro)}
.wheel-modal-box{max-width:380px;padding:0;overflow:hidden}
.wheel-modal-header{padding:18px 20px;border-bottom:1px solid var(--gris-borde);text-align:center;font-weight:800;font-size:15px}
.wheel-columns{display:flex;padding:0 10px}
.wheel-col{flex:1;height:220px;overflow-y:scroll;scroll-snap-type:y mandatory;position:relative}
.wheel-col::-webkit-scrollbar{display:none}.wheel-col-spacer{height:88px;flex-shrink:0}
.wheel-item{height:44px;display:flex;align-items:center;justify-content:center;font-size:17px;color:#b5b5b9;font-weight:600;scroll-snap-align:center}
.wheel-item.selected{color:var(--negro);font-weight:800;font-size:19px}
.wheel-highlight-band{position:absolute;left:10px;right:10px;top:50%;transform:translateY(-22px);height:44px;border-top:1.5px solid var(--gris-borde);border-bottom:1.5px solid var(--gris-borde);pointer-events:none}
.wheel-modal-footer{padding:16px 20px;border-top:1px solid var(--gris-borde)}
.detail-view-banner{background:var(--gris-claro);border:1px solid var(--gris-borde);border-radius:10px;padding:12px 16px;font-size:13.5px;color:var(--gris-texto);margin-bottom:18px;font-weight:600}
@media (max-width:760px){.record-card{grid-template-columns:1fr;gap:6px}}
</style>
